# Alethia AI 知识库 v5.0 · Docker Compose 编排
# 一键启动：docker compose up -d

name: alethia

services:
  # === PostgreSQL + pgvector ===
  postgres:
    image: pgvector/pgvector:pg16
    container_name: alethia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: alethia
      POSTGRES_PASSWORD: alethia
      POSTGRES_DB: alethia
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alethia -d alethia"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - alethia-net

  # === Brain API 后端服务 ===
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: alethia-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://alethia:alethia@postgres:5432/alethia
      BRAIN_PORT: "3000"
      LANGUAGE: zh-CN
      BRAIN_API_KEY: ${BRAIN_API_KEY:-}
      DAILY_BUDGET: ${DAILY_BUDGET:-5}
      MONTHLY_BUDGET: ${MONTHLY_BUDGET:-50}
      PER_QUERY_BUDGET: ${PER_QUERY_BUDGET:-0.5}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      NLI_PROVIDER: ${NLI_PROVIDER:-local}
      RERANKER_ENABLED: ${RERANKER_ENABLED:-false}
      # 大模型密钥（按需填写）
      BAILIAN_API_KEY: ${BAILIAN_API_KEY:-}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      ERNIE_API_KEY: ${ERNIE_API_KEY:-}
      SPARK_API_KEY: ${SPARK_API_KEY:-}
      HUNYUAN_API_KEY: ${HUNYUAN_API_KEY:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      YI_API_KEY: ${YI_API_KEY:-}
      BAICHUAN_API_KEY: ${BAICHUAN_API_KEY:-}
      HF_API_KEY: ${HF_API_KEY:-}
      ZERANK_API_KEY: ${ZERANK_API_KEY:-}
      TZ: Asia/Shanghai
    volumes:
      - wiki_data:/app/wiki
      - library_data:/app/server/data/library
      - changelog_data:/app/server/data/changelog
      - raw_data:/app/server/data/raw
      - summaries_data:/app/server/data/summaries
    ports:
      - "3000:3000"
    networks:
      - alethia-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # === Web 前端（nginx 静态服务） ===
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: alethia-web
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "80:80"
      # 如需 HTTPS，请使用反向代理（如 Traefik/Caddy）或在此处挂载证书
    networks:
      - alethia-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # === 一次性初始化任务 ===
  # 执行数据库迁移 + 种子数据
  init:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: alethia-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://alethia:alethia@postgres:5432/alethia
      LANGUAGE: zh-CN
      NODE_ENV: production
    entrypoint: ["/bin/sh", "/app/init.sh"]
    volumes:
      - ./init.sh:/app/init.sh:ro
      - wiki_data:/app/wiki
    restart: "no"
    networks:
      - alethia-net

volumes:
  postgres_data:
  wiki_data:
  library_data:
  changelog_data:
  raw_data:
  summaries_data:

networks:
  alethia-net:
    driver: bridge
