# Alethia AI 知识库 v5.0 · Docker Compose 编排
# 一键启动：docker compose up -d

name: alethia

services:
  # === PostgreSQL + pgvector ===
  postgres:
    image: pgvector/pgvector:pg16
    container_name: alethia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alethia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alethia}
      POSTGRES_DB: ${POSTGRES_DB:-alethia}
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alethia -d alethia"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - alethia-net

  # === Brain API 后端服务 ===
  # 注意：敏感配置（API Key、预算、模型密钥等）统一从 .env 文件注入，
  # .env 文件切勿提交到 Git 仓库（已在 .gitignore 中忽略）。
  # 本地启动前请复制 .env.example 为 .env 并填写真实值。
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: alethia-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # 从 .env 文件注入敏感配置（API Key、预算、模型参数等）
    env_file:
      - .env
    # 仅保留由 compose 组合 / 注入的非敏感运行参数
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-alethia}:${POSTGRES_PASSWORD:-alethia}@postgres:5432/${POSTGRES_DB:-alethia}
      BRAIN_PORT: "3000"
      TZ: Asia/Shanghai
    # 日志轮转：避免日志文件无限增长撑满磁盘
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - wiki_data:/app/wiki
      - library_data:/app/server/data/library
      - changelog_data:/app/server/data/changelog
      - raw_data:/app/server/data/raw
      - summaries_data:/app/server/data/summaries
    ports:
      - "3000:3000"
    networks:
      - alethia-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # === Web 前端（nginx 静态服务） ===
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: alethia-web
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "80:80"
      # 如需 HTTPS，请使用反向代理（如 Traefik/Caddy）或在此处挂载证书
    # 日志轮转：避免日志文件无限增长撑满磁盘
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - alethia-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # === 一次性初始化任务 ===
  # 执行数据库迁移 + 种子数据
  init:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: alethia-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-alethia}:${POSTGRES_PASSWORD:-alethia}@postgres:5432/${POSTGRES_DB:-alethia}
      LANGUAGE: zh-CN
      NODE_ENV: production
    entrypoint: ["/bin/sh", "/app/init.sh"]
    volumes:
      - ./init.sh:/app/init.sh:ro
      - wiki_data:/app/wiki
    restart: "no"
    networks:
      - alethia-net

volumes:
  postgres_data:
  wiki_data:
  library_data:
  changelog_data:
  raw_data:
  summaries_data:

networks:
  alethia-net:
    driver: bridge
