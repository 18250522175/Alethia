# Alethia AI 知识库 v5.0 · Docker Compose 编排
# 一键启动：docker compose up -d
# 首次使用前请复制 .env.example 为 .env 并设置强密码（POSTGRES_PASSWORD 必填）

name: alethia

services:
  # === PostgreSQL 数据库（含 pgvector 扩展） ===
  postgres:
    image: pgvector/pgvector:pg16
    container_name: alethia-postgres
    restart: unless-stopped
    command:
      - "postgres"
      - "-c shared_buffers=256MB"
      - "-c effective_cache_size=768MB"
      - "-c work_mem=16MB"
      - "-c maintenance_work_mem=64MB"
      - "-c random_page_cost=1.1"
      - "-c max_connections=50"
    environment:
      # 强制要求显式设置 POSTGRES_PASSWORD，避免弱默认密码
      POSTGRES_USER: ${POSTGRES_USER:-alethia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD 必须在 .env 中设置（参考 .env.example）}
      POSTGRES_DB: ${POSTGRES_DB:-alethia}
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # 不再向宿主暴露 5432，仅 server/init 通过 backend 网络访问
    # 本地调试时取消下方注释即可
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alethia} -d ${POSTGRES_DB:-alethia}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"

  # === Brain API 后端服务 ===
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: alethia-server
    restart: unless-stopped
    stop_grace_period: 5m
    depends_on:
      init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-alethia}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD 必须在 .env 中设置}@postgres:5432/${POSTGRES_DB:-alethia}
      BRAIN_PORT: "3000"
      LANGUAGE: zh-CN
      BRAIN_API_KEY: ${BRAIN_API_KEY:-}
      DAILY_BUDGET: ${DAILY_BUDGET:-5}
      MONTHLY_BUDGET: ${MONTHLY_BUDGET:-50}
      PER_QUERY_BUDGET: ${PER_QUERY_BUDGET:-0.5}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      NLI_PROVIDER: ${NLI_PROVIDER:-local}
      RERANKER_ENABLED: ${RERANKER_ENABLED:-false}
      # @xenova/transformers 模型缓存持久化
      HF_HOME: /app/server/.cache/huggingface
      # tesseract.js OCR 语言数据缓存持久化
      TESSDATA_PREFIX: /app/server/.cache/tessdata
      # 数据存储路径（与 Volume 挂载保持一致）
      LIBRARY_PATH: /app/server/library/objects
      # 大模型密钥（按需填写）
      BAILIAN_API_KEY: ${BAILIAN_API_KEY:-}
      BAILIAN_BASE_URL: ${BAILIAN_BASE_URL:-}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:-}
      ZHIPU_BASE_URL: ${ZHIPU_BASE_URL:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      MOONSHOT_BASE_URL: ${MOONSHOT_BASE_URL:-}
      ERNIE_API_KEY: ${ERNIE_API_KEY:-}
      ERNIE_BASE_URL: ${ERNIE_BASE_URL:-}
      SPARK_API_KEY: ${SPARK_API_KEY:-}
      SPARK_BASE_URL: ${SPARK_BASE_URL:-}
      HUNYUAN_API_KEY: ${HUNYUAN_API_KEY:-}
      HUNYUAN_BASE_URL: ${HUNYUAN_BASE_URL:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_BASE_URL: ${MINIMAX_BASE_URL:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-}
      YI_API_KEY: ${YI_API_KEY:-}
      YI_BASE_URL: ${YI_BASE_URL:-}
      BAICHUAN_API_KEY: ${BAICHUAN_API_KEY:-}
      BAICHUAN_BASE_URL: ${BAICHUAN_BASE_URL:-}
      HF_API_KEY: ${HF_API_KEY:-}
      ZERANK_API_KEY: ${ZERANK_API_KEY:-}
      TZ: Asia/Shanghai
    volumes:
      - wiki_data:/app/server/wiki
      - library_data:/app/server/library/objects
      - changelog_data:/app/server/changelog
      - raw_data:/app/server/raw
      - summaries_data:/app/server/summaries
      - model_cache:/app/server/.cache/huggingface
      - tessdata:/app/server/.cache/tessdata
    # 3000 端口不直接暴露，统一通过 nginx (80) 访问
    # 如需直连调试，取消下方注释
    # ports:
    #   - "3000:3000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000/health > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.5"
        reservations:
          memory: 256M
          cpus: "0.5"

  # === Web 前端（nginx 静态服务） ===
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: alethia-web
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "80:80"
      # 如需 HTTPS，请使用反向代理（如 Traefik/Caddy）或在此处挂载证书
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - frontend
    healthcheck:
      # 不仅检查 nginx 自身，也通过 /health 反代确认后端可达
      test: ["CMD-SHELL", "wget -q -O- http://localhost/health > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # === 一次性初始化任务 ===
  # 执行数据库迁移 + 种子数据
  init:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: alethia-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-alethia}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD 必须在 .env 中设置}@postgres:5432/${POSTGRES_DB:-alethia}
      LANGUAGE: zh-CN
      NODE_ENV: production
    entrypoint: ["/app/init.sh"]
    volumes:
      - wiki_data:/app/server/wiki
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

volumes:
  postgres_data:
  wiki_data:
  library_data:
  changelog_data:
  raw_data:
  summaries_data:
  model_cache:
  tessdata:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
