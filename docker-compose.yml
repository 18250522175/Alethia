# Alethia AI 知识库 v5.0 · Docker Compose 编排
# 一键启动：docker compose up -d
# 首次使用前请复制 .env.example 为 .env 并设置强密码（POSTGRES_PASSWORD 必填）
#
# 国内网络加速：
#   在 .env 中设置 DOCKER_REGISTRY_MIRROR=registry.cn-hangzhou.aliyuncs.com
#   或先运行 bash scripts/docker-pull.sh 预拉取镜像

name: alethia

services:
  # === PostgreSQL 数据库（含 pgvector 扩展） ===
  postgres:
    image: ${DOCKER_REGISTRY_MIRROR:-}pgvector/pgvector:pg16
    container_name: alethia-postgres
    restart: unless-stopped
    command:
      - "postgres"
      - "-c"
      - "ssl=off"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=768MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "max_connections=50"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alethia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD 必须在 .env 中设置（参考 .env.example）}
      POSTGRES_DB: ${POSTGRES_DB:-alethia}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alethia} -d ${POSTGRES_DB:-alethia}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
      start_interval: 2s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"

  # === Brain API 后端服务 ===
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: alethia-server
    restart: unless-stopped
    stop_grace_period: 5m
    depends_on:
      init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-alethia}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD 必须在 .env 中设置}@postgres:5432/${POSTGRES_DB:-alethia}
      BRAIN_PORT: "3000"
      LANGUAGE: zh-CN
      BRAIN_API_KEY: ${BRAIN_API_KEY:-}
      DAILY_BUDGET: ${DAILY_BUDGET:-5}
      MONTHLY_BUDGET: ${MONTHLY_BUDGET:-50}
      PER_QUERY_BUDGET: ${PER_QUERY_BUDGET:-0.5}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      NLI_PROVIDER: ${NLI_PROVIDER:-local}
      RERANKER_ENABLED: ${RERANKER_ENABLED:-false}
      HF_HOME: /app/server/.cache/huggingface
      TESSDATA_PREFIX: /app/server/.cache/tessdata
      LIBRARY_PATH: /app/server/library/objects
      BAILIAN_API_KEY: ${BAILIAN_API_KEY:-}
      BAILIAN_BASE_URL: ${BAILIAN_BASE_URL:-}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:-}
      ZHIPU_BASE_URL: ${ZHIPU_BASE_URL:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      MOONSHOT_BASE_URL: ${MOONSHOT_BASE_URL:-}
      ERNIE_API_KEY: ${ERNIE_API_KEY:-}
      ERNIE_BASE_URL: ${ERNIE_BASE_URL:-}
      SPARK_API_KEY: ${SPARK_API_KEY:-}
      SPARK_BASE_URL: ${SPARK_BASE_URL:-}
      HUNYUAN_API_KEY: ${HUNYUAN_API_KEY:-}
      HUNYUAN_BASE_URL: ${HUNYUAN_BASE_URL:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_BASE_URL: ${MINIMAX_BASE_URL:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-}
      YI_API_KEY: ${YI_API_KEY:-}
      YI_BASE_URL: ${YI_BASE_URL:-}
      BAICHUAN_API_KEY: ${BAICHUAN_API_KEY:-}
      BAICHUAN_BASE_URL: ${BAICHUAN_BASE_URL:-}
      HF_API_KEY: ${HF_API_KEY:-}
      ZERANK_API_KEY: ${ZERANK_API_KEY:-}
      TZ: Asia/Shanghai
    volumes:
      - wiki_data:/app/server/wiki
      - library_data:/app/server/library/objects
      - changelog_data:/app/server/changelog
      - raw_data:/app/server/raw
      - summaries_data:/app/server/summaries
      - model_cache:/app/server/.cache/huggingface
      - tessdata:/app/server/.cache/tessdata
    ports:
      - "3000:3000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - frontend
      - backend
    # 使用 Node.js 原生 HTTP 请求进行健康检查，无需安装额外工具
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.5"
        reservations:
          memory: 256M
          cpus: "0.5"

  # === Web 前端（nginx 静态服务） ===
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: alethia-web
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "80:80"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost/ > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # === 一次性初始化任务 ===
  init:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: alethia-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-alethia}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD 必须在 .env 中设置}@postgres:5432/${POSTGRES_DB:-alethia}
      LANGUAGE: zh-CN
      NODE_ENV: production
    entrypoint: ["/app/init.sh"]
    volumes:
      - wiki_data:/app/server/wiki
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # === PostgreSQL 定时备份 ===
  backup:
    image: ${DOCKER_REGISTRY_MIRROR:-}postgres:16-alpine
    container_name: alethia-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-alethia}
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD 必须在 .env 中设置}
      PGDATABASE: ${POSTGRES_DB:-alethia}
      TZ: Asia/Shanghai
    volumes:
      - backup_data:/backup
    entrypoint: |
      /bin/sh -c '
      while true; do
        sleep 3600;
        HOUR=$$(date +%H);
        if [ "$$HOUR" = "02" ]; then
          FILE="/backup/alethia_$$(date +%Y%m%d_%H%M%S).sql.gz";
          pg_dump --no-owner --no-acl | gzip > "$$FILE";
          echo "$$(date): Backup created: $$FILE";
          find /backup -name "alethia_*.sql.gz" -mtime +7 -delete;
        fi;
      done
      '
    networks:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

volumes:
  postgres_data:
  wiki_data:
  library_data:
  changelog_data:
  raw_data:
  summaries_data:
  model_cache:
  tessdata:
  backup_data:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge