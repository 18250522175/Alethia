# Alethia Web 前端 Nginx 配置
# 静态文件 + API 反向代理

server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    # 静态前端文件
    root   /usr/share/nginx/html;
    index  index.html;

    # gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # API 反向代理到后端服务
    location /api/ {
        proxy_pass http://server:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # 流式问答支持
        proxy_buffering off;
        proxy_cache off;
    }

    # /health 也反代到后端
    location = /health {
        proxy_pass http://server:3000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 媒体文件（PDF/音视频）反代，支持 Range 请求
    location /media/ {
        proxy_pass http://server:3000/media/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Range $http_range;
        proxy_set_header Accept-Ranges bytes;
        proxy_buffering off;
    }

    # SPA 路由回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存（hash 文件名，可永久缓存）
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 上传文件大小限制（用于 library 文件上传）
    client_max_body_size 100m;
}
