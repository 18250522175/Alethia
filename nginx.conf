# Alethia Web 前端 Nginx 配置（主配置 /etc/nginx/nginx.conf）
# 静态文件 + API 反向代理

# Docker 容器中显式指定 worker 数，避免 auto 检测到宿主机所有 CPU
worker_processes 2;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 性能基础配置
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # 自定义日志格式（含请求耗时）
    log_format timing '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      'rt=$request_time uct=$upstream_connect_time';

    server {
        listen 80;
        listen [::]:80;
        server_name _;

        access_log /var/log/nginx/access.log timing;

        # 静态前端文件
        root /usr/share/nginx/html;
        index index.html;

        # gzip 压缩
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml font/woff2 application/vnd.ms-fontobject application/font-woff;

        # API 反向代理到后端服务
        location /api/ {
            proxy_pass http://server:3000/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # LLM 流式问答可能持续较长时间（多轮反思、长上下文），60s 偏短
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 10s;

            # 流式问答支持
            proxy_buffering off;
            proxy_cache off;
        }

        # /health 也反代到后端
        location = /health {
            proxy_pass http://server:3000/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # 静态站点导出文件（/exports 反代到后端）
        location /exports/ {
            proxy_pass http://server:3000/exports/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # SPA 路由回退到 index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # 静态资源缓存（hash 文件名，可永久缓存）
        location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # CSP：所有资源走同源；style 加 'unsafe-inline' 兼容 Tailwind/Headless UI 动态注入
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; media-src 'self' blob:; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'" always;
        # 禁用未使用的设备 API（单人本地项目，无相机/麦克风/支付等需求）
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), accelerometer=(), gyroscope=(), magnetometer=()" always;
        # HSTS 仅在 HTTPS 下生效；当前仅 HTTP（生产应通过外层 Traefik/Caddy 终止 TLS）故不在此添加

        # 上传文件大小限制（用于 library 文件上传，与 server 内存限制 1G 匹配）
        client_max_body_size 50m;
    }
}